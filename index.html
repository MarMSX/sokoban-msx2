<!DOCTYPE html>
<html>
<head>
  <title>Sokoban Solver MSX</title>
  <link href="bootstrap.min.css" rel="stylesheet">
  <script src="bootstrap.bundle.min.js"></script>
  <script src="sokoban-map-tools.js"></script>
  <script src="sokoban-solver.js"></script>
  <script src="sokoban-map-data.js"></script>
  <script src="sokoban-page-actions.js"></script>
  <style>
    .controls {
      border: 1px solid #eee;
      padding: 10px;
    }
    .btn-adj {
      width: 100px;
    }
  </style>
</head>

<body>
  <div style="display: flex; width: 100%; justify-content: center; margin-bottom: 50px">
    <img src="title.jpg">
  </div>
  <div style="display: flex; margin: 20px; justify-content: center;">
    <div>
      <div class="controls">
        <p>Fase:</p>
        <div class="input-group">
          <select id="comboA" class="form-select"></select>
          &nbsp; - &nbsp;
          <select id="comboB" class="form-select"></select>
        </div>
      </div>

      <div class="controls mt-4">
        <p>Ações:</p>
        <button id="carrega" onclick="loadMapOnScreen()" class="btn btn-primary btn-adj">Carregar</button>
        <button id="limpar" onclick="limparMapa()" class="btn btn-secondary btn-adj mx-2">Limpar</button>
        <button id="solucionar" onclick="solveGame()" class="btn btn-success btn-adj mx-5">Solucionar</button>
      </div>

      <div class="controls mt-4">
        <p>Passo a Passo:</p>
        <!-- Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc. -->
        <textarea id="textarea-solucao" cols="40" rows="3"></textarea>
        <br><br>
        <button id="first" onclick="firstPage()" class="btn btn-secondary">
          <svg width="24" height="24" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M492.2 477.6c-12 5-25.7 2.2-34.9-6.9L288 301.3 288 448c0 12.9-7.8 24.6-19.8 29.6s-25.7 2.2-34.9-6.9L64 301.3 64 448c0 17.7-14.3 32-32 32S0 465.7 0 448L0 64C0 46.3 14.3 32 32 32S64 46.3 64 64L64 210.7 233.4 41.4c9.2-9.2 22.9-11.9 34.9-6.9S288 51.1 288 64l0 146.7 169.4-169.4c9.2-9.2 22.9-11.9 34.9-6.9S512 51.1 512 64l0 384c0 12.9-7.8 24.6-19.8 29.6z"
            fill="white"/>
          </svg>
        </button>
        <button id="prev" onclick="prevPage()" class="btn btn-secondary">
          <svg width="24" height="24" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M204.3 43.1C215.9 32 233 28.9 247.7 35.2S272 56 272 72l0 136.3 172.3-165.1C455.9 32 473 28.9 487.7 35.2S512 56 512 72l0 368c0 16-9.6 30.5-24.3 36.8s-31.8 3.2-43.4-7.9L272 303.7 272 440c0 16-9.6 30.5-24.3 36.8s-31.8 3.2-43.4-7.9l-192-184C4.5 277.3 0 266.9 0 256s4.5-21.3 12.3-28.9l192-184z"
            fill="white"/>
          </svg>
        </button>
        <button id="next" onclick="nextPage()" class="btn btn-secondary">
          <svg transform="rotate(180)" width="24" height="24" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M204.3 43.1C215.9 32 233 28.9 247.7 35.2S272 56 272 72l0 136.3 172.3-165.1C455.9 32 473 28.9 487.7 35.2S512 56 512 72l0 368c0 16-9.6 30.5-24.3 36.8s-31.8 3.2-43.4-7.9L272 303.7 272 440c0 16-9.6 30.5-24.3 36.8s-31.8 3.2-43.4-7.9l-192-184C4.5 277.3 0 266.9 0 256s4.5-21.3 12.3-28.9l192-184z"
            fill="white"/>
          </svg>
        </button>
        <button id="last" onclick="lastPage()" class="btn btn-secondary">
          <svg transform="rotate(180)" width="24" height="24" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M492.2 477.6c-12 5-25.7 2.2-34.9-6.9L288 301.3 288 448c0 12.9-7.8 24.6-19.8 29.6s-25.7 2.2-34.9-6.9L64 301.3 64 448c0 17.7-14.3 32-32 32S0 465.7 0 448L0 64C0 46.3 14.3 32 32 32S64 46.3 64 64L64 210.7 233.4 41.4c9.2-9.2 22.9-11.9 34.9-6.9S288 51.1 288 64l0 146.7 169.4-169.4c9.2-9.2 22.9-11.9 34.9-6.9S512 51.1 512 64l0 384c0 12.9-7.8 24.6-19.8 29.6z"
            fill="white"/>
          </svg>
        </button>
        <div class="d-inline-block mx-5 fs-5" id="page-counter"></div>
      </div>

      <div class="controls mt-4">
        <p>Mapa:</p>
        <div class="mb-4">
          <textarea id="textarea" cols="40" rows="5"></textarea>
          <div id="msg-erro" style="display: none"></div>
        </div>
        
        <button id="carrega-mapa" onclick="loadMapFromPage()" class="btn btn-secondary btn-adj">Carregar</button>
        <button id="salva-mapa" onclick="saveMapFromPage()" class="btn btn-secondary btn-adj">Obter</button>
      </div>
    </div>

    <!-- Canvas -->
    <div style="width: 400px; margin-left: 50px;">
      <canvas 
        id="gameCanvas" 
        width="370" 
        height="330" 
        style="border:1px solid black;">
      </canvas>
      <br>
      <canvas 
        id="gameTileCanvas" 
        width="276" 
        height="76" 
        style="border:1px solid black; margin-left: 45px">
      </canvas>      
    </div>
  </div>

  <script>
    loadGameMap();
    loadCombos();
    blockControls(true);    
  </script>
  
</body>
</html>
